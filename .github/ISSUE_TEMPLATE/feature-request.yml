name: 💡 Feature request
description: Suggest a new tool, generator, or improvement to talos.tools.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the user need or pain point.
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Your proposal
      description: How would you like to see it solved?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Are there existing tools or workarounds? Why are they not enough?
